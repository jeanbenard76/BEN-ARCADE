<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faraway — Calculateur Automatique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Nunito:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Nunito", "ui-sans-serif", "system-ui"],
                        display: ["Playfair Display", "serif"],
                        mono: ["Share Tech Mono", "monospace"],
                    },
                    colors: {
                        fara: {
                            bg: '#F8F4E6', card: '#FCFAF5', ink: '#3A2E1E', inkMuted: '#9C8A6E',
                            purple: '#7B5EA7', border: '#EAD9B5',
                            cBlue: '#3B7D7A', cGreen: '#3E7D52', cRed: '#B04A5A', cYellow: '#C47A1E', cGray: '#9C8A6E'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8F4E6; color: #3A2E1E; -webkit-tap-highlight-color: transparent; }
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        }
        .blob-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.3; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .tab-active { border-bottom-color: #7B5EA7; color: #7B5EA7; background: rgba(123, 94, 167, 0.05); }
    </style>
</head>
<body class="antialiased pb-20 relative min-h-screen font-sans">

    <!-- AQUARELLES ARRIÈRE-PLAN -->
    <div class="blob-bg" aria-hidden="true">
        <div class="blob" style="width:400px;height:400px;top:-50px;left:-100px;background:rgba(196,173,224,0.4);"></div>
        <div class="blob" style="width:300px;height:300px;bottom:-50px;right:-50px;background:rgba(168,212,210,0.4);"></div>
        <div class="blob" style="width:350px;height:350px;top:40%;left:50%;transform:translate(-50%,-50%);background:rgba(240,201,122,0.25);"></div>
    </div>

    <!-- ========================================== -->
    <!-- ÉCRAN SETUP (Pastels & Joueurs)            -->
    <!-- ========================================== -->
    <div id="setup-screen" class="relative z-10 min-h-screen flex flex-col justify-center px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="font-display text-4xl font-bold tracking-widest text-fara-ink mb-3 uppercase">Faraway</h1>
            <p class="font-display italic text-base text-fara-inkMuted mb-6">Calculateur Automatisé</p>
        </header>

        <main class="w-full max-w-md mx-auto">
            <div class="bg-fara-card rounded-[24px] p-6 shadow-sm border border-fara-border">
                <h2 class="text-[11px] font-bold tracking-widest text-fara-inkMuted uppercase mb-5">Les Explorateurs</h2>
                
                <div id="player-list" class="space-y-4 mb-6"></div>
                
                <button type="button" onclick="addPlayer()" class="w-full py-3.5 border border-[#D4BE93] text-fara-inkMuted font-sans text-sm font-bold hover:bg-fara-border/20 transition-colors rounded-xl bg-transparent">
                    + Ajouter un explorateur
                </button>
                <hr class="border-fara-border my-6">
                
                <button id="start-btn" disabled type="button" onclick="startGame()" class="w-full py-4 bg-gray-400 text-white font-sans font-bold text-lg rounded-xl shadow-md cursor-not-allowed transition-all">
                    Chargement des cartes...
                </button>
            </div>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- ÉCRAN DE JEU (Saisie + Stats)              -->
    <!-- ========================================== -->
    <div id="game-screen" class="hidden relative z-10 min-h-screen">
        <header class="bg-fara-card/90 backdrop-blur-md border-b border-fara-border sticky top-0 z-50">
            <div class="px-4 py-3 flex items-center justify-between">
                <button onclick="location.reload()" class="text-fara-inkMuted hover:text-fara-ink font-bold text-xs uppercase tracking-widest">‹ Retour</button>
                <span class="font-display font-bold text-xl uppercase tracking-widest text-fara-ink">Faraway</span>
                <span class="w-12"></span> <!-- Spacer -->
            </div>
            
            <!-- Tabs (Mobile) -->
            <div class="flex border-t border-fara-border lg:hidden bg-white/50">
                <button onclick="setActiveTab('input')" id="tab-input" class="flex-1 py-3 font-sans font-bold text-xs tracking-widest border-b-2 tab-active text-fara-ink">CARNET</button>
                <button onclick="setActiveTab('stats')" id="tab-stats" class="flex-1 py-3 font-sans font-bold text-xs tracking-widest border-b-2 border-transparent text-fara-inkMuted">STATS</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 sm:p-6 mt-2">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- ZONE DE SAISIE (Gauche) -->
                <section id="section-input" class="lg:col-span-7 pb-10">
                    <div class="mb-5 text-center">
                        <p class="font-display italic text-sm text-fara-ink">
                            Saisissez les numéros de vos cartes (C1 à C8).<br>Gérez vos Sanctuaires via le bouton dédié.
                        </p>
                    </div>

                    <div id="player-inputs" class="space-y-6"></div>
                </section>

                <!-- ZONE STATISTIQUES (Droite) -->
                <div id="section-stats" class="lg:col-span-5 space-y-6 hidden lg:block">
                    <!-- Classement -->
                    <section class="bg-fara-card border border-fara-border rounded-2xl overflow-hidden shadow-sm">
                        <div class="bg-fara-ink px-5 py-3"><span class="font-display text-lg text-white italic">Classement</span></div>
                        <div id="scoreboard" class="divide-y divide-fara-border/50 p-2 bg-white/50"></div>
                    </section>

                    <!-- Graphique -->
                    <section class="bg-fara-card border border-fara-border rounded-2xl p-5 shadow-sm bg-white/50">
                        <div class="font-sans text-xs font-bold tracking-widest text-fara-inkMuted uppercase mb-4 text-center">Évolution du Score (C8 ➔ C1 ➔ S)</div>
                        <div class="h-[250px] w-full"><canvas id="evolutionChart"></canvas></div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- MODALE SANCTUAIRES                         -->
    <!-- ========================================== -->
    <div id="sanctuary-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] hidden flex-col justify-end sm:justify-center items-center pb-0 sm:p-4 transition-opacity">
        <div class="bg-fara-card w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl shadow-xl overflow-hidden flex flex-col">
            <div class="p-4 bg-fara-ink text-white flex justify-between items-center shrink-0">
                <h3 class="font-display text-lg italic">Sanctuaires de <span id="modal-player-name"></span></h3>
                <button onclick="closeSanctuaryModal()" class="text-white/70 hover:text-white font-bold text-xl">×</button>
            </div>
            
            <div class="p-5 overflow-y-auto max-h-[70vh] hide-scrollbar space-y-6">
                <div>
                    <label class="text-xs font-bold text-fara-inkMuted uppercase tracking-widest mb-2 block">Points générés par ces sanctuaires</label>
                    <input type="number" id="sanc-points" class="w-full bg-white border border-fara-border rounded-xl p-3 text-lg font-bold text-center outline-none focus:border-fara-purple transition-colors" placeholder="0">
                </div>

                <div>
                    <label class="text-xs font-bold text-fara-inkMuted uppercase tracking-widest mb-2 block">Cumul des Ressources</label>
                    <div class="grid grid-cols-5 gap-2">
                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-2 text-center"><div class="text-[9px] font-bold mb-1 uppercase text-blue-800">Uddu</div><input type="number" id="sanc-uddu" class="w-full text-center font-bold text-blue-900 bg-transparent outline-none" placeholder="0"></div>
                        <div class="bg-green-50 border border-green-200 rounded-lg p-2 text-center"><div class="text-[9px] font-bold mb-1 uppercase text-green-800">Okiko</div><input type="number" id="sanc-okiko" class="w-full text-center font-bold text-green-900 bg-transparent outline-none" placeholder="0"></div>
                        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-2 text-center"><div class="text-[9px] font-bold mb-1 uppercase text-yellow-800">Goldlog</div><input type="number" id="sanc-goldlog" class="w-full text-center font-bold text-yellow-900 bg-transparent outline-none" placeholder="0"></div>
                        <div class="bg-gray-100 border border-gray-300 rounded-lg p-2 text-center"><div class="text-[9px] font-bold mb-1 uppercase text-gray-800">Parchemins</div><input type="number" id="sanc-clue" class="w-full text-center font-bold text-gray-900 bg-transparent outline-none" placeholder="0"></div>
                        <div class="bg-indigo-50 border border-indigo-200 rounded-lg p-2 text-center"><div class="text-[9px] font-bold mb-1 uppercase text-indigo-800">Nuit</div><input type="number" id="sanc-nightTime" class="w-full text-center font-bold text-indigo-900 bg-transparent outline-none" placeholder="0"></div>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-fara-inkMuted uppercase tracking-widest mb-2 block">Couleurs des sanctuaires (Quantité)</label>
                    <div class="grid grid-cols-5 gap-2">
                        <input type="number" id="sanc-blue" class="border-b-2 border-blue-500 text-center font-bold outline-none p-1 w-full bg-transparent" placeholder="Bleu">
                        <input type="number" id="sanc-green" class="border-b-2 border-green-500 text-center font-bold outline-none p-1 w-full bg-transparent" placeholder="Vert">
                        <input type="number" id="sanc-red" class="border-b-2 border-red-500 text-center font-bold outline-none p-1 w-full bg-transparent" placeholder="Rouge">
                        <input type="number" id="sanc-yellow" class="border-b-2 border-yellow-500 text-center font-bold outline-none p-1 w-full bg-transparent" placeholder="Jaune">
                        <input type="number" id="sanc-gray" class="border-b-2 border-gray-400 text-center font-bold outline-none p-1 w-full bg-transparent" placeholder="Gris">
                    </div>
                </div>
            </div>
            
            <div class="p-4 bg-white border-t border-fara-border shrink-0">
                <button onclick="saveSanctuaryModal()" class="w-full py-3 bg-fara-purple text-white font-bold rounded-xl shadow hover:opacity-90 transition-opacity">Enregistrer & Calculer</button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- SCRIPTS METIER                             -->
    <!-- ========================================== -->
    <script>
        // Thèmes pastels
        const THEMES = [
            { bg: '#EDE4F5', border: '#C4ADE0', text: '#7B5EA7' }, // Violet
            { bg: '#E3F4F3', border: '#A8D4D2', text: '#3B7D7A' }, // Bleu vert
            { bg: '#FEF6E4', border: '#F0C97A', text: '#C47A1E' }, // Jaune
            { bg: '#FDE8EA', border: '#E8A0A8', text: '#B04A5A' }, // Rose
            { bg: '#E8F5ED', border: '#94C9A5', text: '#3E7D52' }, // Vert
            { bg: '#F8EDDF', border: '#D4A878', text: '#B07040' }  // Désert
        ];

        let REGIONS_DATA = [];
        let players = ['Explorateur 1', 'Explorateur 2'];
        let gameData = {};
        let currentPlayerModal = null;
        let chart = null;

        // 1. CHARGEMENT API
        async function loadGameData() {
            try {
                const response = await fetch('./regions.json');
                REGIONS_DATA = await response.json();
                
                const btn = document.getElementById('start-btn');
                btn.disabled = false;
                btn.classList.remove('bg-gray-400', 'cursor-not-allowed');
                btn.classList.add('bg-fara-purple', 'hover:opacity-90');
                btn.innerText = "Partir en exploration →";
            } catch (err) {
                console.error("Erreur de chargement du JSON :", err);
                const btn = document.getElementById('start-btn');
                btn.innerText = "Erreur fichier regions .json !";
                btn.classList.add('bg-red-500');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderPlayerSetup();
            loadGameData();
        });

        // 2. SETUP SCREEN
        function renderPlayerSetup() {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map((p, i) => {
                const t = THEMES[i % THEMES.length];
                const isPlaceholder = p.startsWith('Explorateur');
                return `
                <div class="flex items-center gap-3 bg-white p-2 rounded-xl border-2 transition-colors" style="border-color: ${t.border}">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center font-sans font-bold text-sm" style="background-color: ${t.bg}; color: ${t.text}">
                        ${i+1}
                    </div>
                    <input class="flex-1 bg-transparent border-none font-bold text-fara-ink outline-none" 
                           placeholder="Explorateur ${i+1}" 
                           value="${isPlaceholder ? '' : p}" 
                           onchange="updatePlayerName(${i}, this.value)">
                    ${players.length > 2 ? `
                        <button type="button" onclick="removePlayer(${i})" class="w-10 h-10 flex items-center justify-center text-fara-inkMuted hover:text-red-500 font-bold text-xl pb-1">×</button>
                    ` : ''}
                </div>
                `;
            }).join('');
        }

        function addPlayer() {
            if (players.length < 6) { players.push(`Explorateur ${players.length + 1}`); renderPlayerSetup(); }
        }

        function removePlayer(idx) {
            players.splice(idx, 1);
            renderPlayerSetup();
        }

        function updatePlayerName(idx, val) {
            players[idx] = val.trim() || `Explorateur ${idx + 1}`;
        }

        // 3. GAME SCREEN
        function startGame() {
            gameData = {};
            players.forEach((p, i) => {
                gameData[p] = {
                    theme: THEMES[i % THEMES.length],
                    cards: Array(8).fill(null),
                    individualScores: Array(8).fill(0),
                    sanctuaries: {
                        points: 0,
                        resources: { uddu: 0, okiko: 0, goldlog: 0, clue: 0, nightTime: 0 },
                        colors: { blue: 0, green: 0, red: 0, yellow: 0, gray: 0 }
                    },
                    score: 0
                };
            });
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            renderGameInputs();
            initChart();
            updateScoreboard();
        }

        function renderGameInputs() {
            const container = document.getElementById('player-inputs');
            
            container.innerHTML = players.map(p => {
                const t = gameData[p].theme;
                return `
                <div class="bg-white rounded-[20px] overflow-hidden shadow-sm border" style="border-color: ${t.border}">
                    
                    <!-- Header Pastel -->
                    <div class="px-5 py-4 flex items-center justify-between border-b" style="background-color: ${t.bg}; border-color: ${t.border}">
                        <span class="font-sans font-bold text-xl truncate max-w-[150px]" style="color: ${t.text}">${p}</span>
                        <div class="flex items-center gap-4">
                            <button onclick="openSanctuaryModal('${p}')" class="text-xs font-bold border px-3 py-1.5 rounded-full bg-white/50 hover:bg-white transition-colors" style="color: ${t.text}; border-color: ${t.border}">
                                + Sanctuaires
                            </button>
                            <span class="font-display text-3xl font-bold w-10 text-right leading-none" style="color: ${t.text}" id="score-${p.replace(/\s/g, '')}">0</span>
                        </div>
                    </div>
                    
                    <!-- Inputs Cartes -->
                    <div class="p-4 bg-white/50">
                        <div class="grid grid-cols-8 gap-1 sm:gap-2">
                            ${[0, 1, 2, 3, 4, 5, 6, 7].map(idx => `
                                <div class="flex flex-col items-center">
                                    <span class="text-[10px] text-fara-inkMuted font-bold">C${idx+1}</span>
                                    <input type="number" 
                                        class="w-full text-center font-bold text-lg border-b-2 outline-none pb-1 transition-colors border-gray-200 focus:border-fara-purple bg-transparent"
                                        id="input-${p.replace(/\s/g, '')}-${idx}"
                                        placeholder="-"
                                        value="${gameData[p].cards[idx] || ''}"
                                        oninput="updateCard('${p}', ${idx}, this.value)"
                                    >
                                    <span id="pts-${p.replace(/\s/g, '')}-${idx}" class="text-[11px] font-bold mt-1 h-4 transition-colors"></span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // 4. MOTEUR DE SCORE
        function updateCard(player, index, val) {
            gameData[player].cards[index] = val ? parseInt(val) : null;
            
            const inputEl = document.getElementById(`input-${player.replace(/\s/g, '')}-${index}`);
            if (val) {
                const region = REGIONS_DATA.find(r => r.explorationDuration === parseInt(val));
                if (region) {
                    const colorMap = { blue: '#3B7D7A', green: '#3E7D52', red: '#B04A5A', yellow: '#C47A1E', gray: '#9C8A6E' };
                    inputEl.style.borderColor = colorMap[region.color];
                    inputEl.style.color = colorMap[region.color];
                } else {
                    inputEl.style.borderColor = '#e5e7eb';
                    inputEl.style.color = '#3A2E1E';
                }
            } else {
                inputEl.style.borderColor = '#e5e7eb';
                inputEl.style.color = '#3A2E1E';
            }

            calculateScore(player);
            updateScoreboard();
            updateChart();
        }

        function calculateScore(player) {
            const data = gameData[player];
            let totalScore = parseInt(data.sanctuaries.points) || 0;
            
            const playedRegions = data.cards.map(id => 
                id ? REGIONS_DATA.find(r => r.explorationDuration === id) : null
            );

            let individualScores = Array(8).fill(null);

            // Décompte C8 -> C1
            for (let i = 7; i >= 0; i--) {
                const cardToEvaluate = playedRegions[i];
                if (!cardToEvaluate) { data.individualScores[i] = 0; continue; }

                individualScores[i] = 0;

                let available = {
                    resources: { ...data.sanctuaries.resources },
                    colors: { ...data.sanctuaries.colors }
                };

                for (let j = 7; j >= i; j--) {
                    const visibleCard = playedRegions[j];
                    if (visibleCard) {
                        available.colors[visibleCard.color] = (available.colors[visibleCard.color] || 0) + 1;
                        if(visibleCard.resources.uddu) available.resources.uddu += visibleCard.resources.uddu;
                        if(visibleCard.resources.okiko) available.resources.okiko += visibleCard.resources.okiko;
                        if(visibleCard.resources.goldlog) available.resources.goldlog += visibleCard.resources.goldlog;
                        if(visibleCard.resources.clue) available.resources.clue++;
                        if(visibleCard.resources.nightTime) available.resources.nightTime++;
                    }
                }

                let reqMet = true;
                if (cardToEvaluate.requirements) {
                    if (available.resources.uddu < cardToEvaluate.requirements.uddu) reqMet = false;
                    if (available.resources.okiko < cardToEvaluate.requirements.okiko) reqMet = false;
                    if (available.resources.goldlog < cardToEvaluate.requirements.goldlog) reqMet = false;
                }

                if (reqMet && cardToEvaluate.quest && cardToEvaluate.quest.multiplier) {
                    let questType = cardToEvaluate.quest.type;
                    let mult = cardToEvaluate.quest.multiplier;
                    let occurences = 0;

                    if (!questType) occurences = 1;
                    else if (["blue", "green", "red", "yellow", "gray"].includes(questType)) occurences = available.colors[questType] || 0;
                    else if (questType.includes("/")) {
                        let [c1, c2] = questType.split("/");
                        occurences = Math.min(available.colors[c1] || 0, available.colors[c2] || 0);
                    } else if (questType === "colorSet") occurences = Math.min(available.colors.blue || 0, available.colors.green || 0, available.colors.red || 0, available.colors.yellow || 0);
                    else if (questType === "resourcesSet") occurences = Math.min(available.resources.uddu || 0, available.resources.okiko || 0, available.resources.goldlog || 0);
                    else if (["uddu", "okiko", "goldlog", "clue", "nightTime"].includes(questType)) occurences = available.resources[questType] || 0;

                    let scoreForThisCard = occurences * mult;
                    individualScores[i] = scoreForThisCard;
                    totalScore += scoreForThisCard;
                }
                
                data.individualScores[i] = individualScores[i] || 0;
            }

            data.score = totalScore;
            document.getElementById(`score-${player.replace(/\s/g, '')}`).innerText = totalScore;

            for (let i = 0; i < 8; i++) {
                const ptsEl = document.getElementById(`pts-${player.replace(/\s/g, '')}-${i}`);
                if (individualScores[i] !== null) {
                    if (individualScores[i] > 0) {
                        ptsEl.innerText = `+${individualScores[i]}`;
                        ptsEl.style.color = data.theme.text;
                    } else {
                        ptsEl.innerText = `0`;
                        ptsEl.style.color = '#9C8A6E';
                        ptsEl.style.opacity = '0.5';
                    }
                } else {
                    ptsEl.innerText = ''; 
                }
            }
        }

        // 5. STATS ET CHART
        function updateScoreboard() {
            const scoreboard = document.getElementById('scoreboard');
            const totals = players.map(p => ({
                name: p,
                total: gameData[p].score,
                theme: gameData[p].theme
            }));
            
            totals.sort((a, b) => b.total - a.total);
            
            scoreboard.innerHTML = totals.map((t, index) => {
                const isLeader = index === 0 && t.total > 0;
                return `
                <div class="px-4 py-3 flex items-center justify-between ${isLeader ? 'bg-fara-border/20' : ''} transition-colors">
                    <div class="flex items-center gap-3">
                        <div class="font-display font-bold text-fara-inkMuted w-4">${index + 1}.</div>
                        <span class="font-sans font-bold text-sm" style="color: ${t.theme.text}">${t.name}</span>
                        ${isLeader ? '<span class="text-sm">🌟</span>' : ''}
                    </div>
                    <div class="font-display text-xl font-bold" style="color: ${isLeader ? t.theme.text : '#3A2E1E'}">
                        ${t.total}
                    </div>
                </div>
            `}).join('');
        }

        function initChart() {
            const ctx = document.getElementById('evolutionChart').getContext('2d');
            if (chart) chart.destroy();
            
            const labels = ['C8', 'C7', 'C6', 'C5', 'C4', 'C3', 'C2', 'C1', 'Sanc.'];

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: players.map(p => ({
                        label: p,
                        data: Array(9).fill(0),
                        borderColor: gameData[p].theme.text,
                        backgroundColor: gameData[p].theme.bg,
                        borderWidth: 2,
                        pointRadius: 4,
                        pointBackgroundColor: '#FFF',
                        pointBorderColor: gameData[p].theme.text,
                        pointBorderWidth: 2,
                        tension: 0.3,
                        fill: false
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(58, 46, 30, 0.05)' }, ticks: { font: { family: 'Share Tech Mono' }, color: '#9C8A6E' }, border: { display: false } },
                        x: { grid: { display: false }, ticks: { font: { family: 'Nunito', weight: 'bold' }, color: '#6B5A42' } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(255, 252, 245, 0.95)', titleColor: '#3A2E1E', bodyColor: '#6B5A42', borderColor: '#EAD9B5', borderWidth: 1,
                            titleFont: { family: 'Playfair Display', weight: 'bold' },
                            callbacks: { label: function(context) { return context.dataset.label + ' : ' + context.parsed.y + ' pts'; } }
                        }
                    }
                }
            });
            updateChart();
        }

        function updateChart() {
            players.forEach((p, i) => {
                const d = gameData[p];
                let cumulative = 0;
                const dataArr = [];
                
                // C8 à C1
                for (let j = 7; j >= 0; j--) {
                    cumulative += d.individualScores[j];
                    dataArr.push(cumulative);
                }
                // Sanctuaires à la fin
                cumulative += parseInt(d.sanctuaries.points) || 0;
                dataArr.push(cumulative);
                
                chart.data.datasets[i].data = dataArr;
                chart.data.datasets[i].label = p;
            });
            chart.update();
        }

        function setActiveTab(tab) {
            const sectionInput = document.getElementById('section-input');
            const sectionStats = document.getElementById('section-stats');
            const tabInput = document.getElementById('tab-input');
            const tabStats = document.getElementById('tab-stats');

            if (tab === 'input') {
                sectionInput.classList.remove('hidden'); sectionStats.classList.add('hidden', 'lg:block');
                tabInput.classList.add('tab-active', 'text-fara-ink'); tabInput.classList.remove('border-transparent', 'text-fara-inkMuted');
                tabStats.classList.remove('tab-active', 'text-fara-ink'); tabStats.classList.add('border-transparent', 'text-fara-inkMuted');
            } else {
                sectionInput.classList.add('hidden'); sectionStats.classList.remove('hidden');
                tabStats.classList.add('tab-active', 'text-fara-ink'); tabStats.classList.remove('border-transparent', 'text-fara-inkMuted');
                tabInput.classList.remove('tab-active', 'text-fara-ink'); tabInput.classList.add('border-transparent', 'text-fara-inkMuted');
                if (chart) setTimeout(() => chart.update(), 100);
            }
        }

        // 6. GESTION MODALE
        function openSanctuaryModal(player) {
            currentPlayerModal = player;
            document.getElementById('modal-player-name').innerText = player;
            const s = gameData[player].sanctuaries;
            
            document.getElementById('sanc-points').value = s.points || '';
            ['uddu', 'okiko', 'goldlog', 'clue', 'nightTime'].forEach(r => document.getElementById(`sanc-${r}`).value = s.resources[r] || '');
            ['blue', 'green', 'red', 'yellow', 'gray'].forEach(c => document.getElementById(`sanc-${c}`).value = s.colors[c] || '');

            document.getElementById('sanctuary-modal').classList.remove('hidden');
            document.getElementById('sanctuary-modal').classList.add('flex');
        }

        function closeSanctuaryModal() {
            document.getElementById('sanctuary-modal').classList.add('hidden');
            document.getElementById('sanctuary-modal').classList.remove('flex');
            currentPlayerModal = null;
        }

        function saveSanctuaryModal() {
            const s = gameData[currentPlayerModal].sanctuaries;
            s.points = parseInt(document.getElementById('sanc-points').value) || 0;
            
            ['uddu', 'okiko', 'goldlog', 'clue', 'nightTime'].forEach(r => s.resources[r] = parseInt(document.getElementById(`sanc-${r}`).value) || 0);
            ['blue', 'green', 'red', 'yellow', 'gray'].forEach(c => s.colors[c] = parseInt(document.getElementById(`sanc-${c}`).value) || 0);

            calculateScore(currentPlayerModal);
            updateScoreboard();
            updateChart();
            closeSanctuaryModal();
        }
    </script>
</body>
</html>
